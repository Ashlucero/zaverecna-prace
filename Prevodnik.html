<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="Assets/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prevodnik</title>
</head>
<body>
    <header>
        <nav class="navbar">                                                                                            <!-- --- Statická navigační lišta --- -->
            <div class="nav-header">
                <h2><i>~Navigace~</i></h2>
            </div>

            <a class="nav-item" href="index.html">                                                                      <!-- Navigační odkaz na index.html -->
                <div class="reveal-dot"></div>
                <svg class="nav-icon" viewBox="0 0 20 20"><path d="M10 2L2 8.5V18h6v-5h4v5h6V8.5L10 2z"/></svg>
                <span class="nav-label">Domů</span>
            </a>

            <a class="nav-item" href="Kalkulacka.html">                                                                 <!-- Navigační odkaz na Kalkulacka.html -->
                <div class="reveal-dot"></div>
                <svg class="nav-icon" viewBox="0 0 20 20"><rect x="3" y="2" width="14" height="16" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="5.5" y="4.5" width="9" height="3" rx="0.5"/><circle cx="6.5" cy="11" r="1"/><circle cx="10" cy="11" r="1"/><circle cx="13.5" cy="11" r="1"/><circle cx="6.5" cy="14" r="1"/><circle cx="10" cy="14" r="1"/><circle cx="13.5" cy="14" r="1"/></svg>
                <span class="nav-label">Kalkulačka</span>
            </a>

            <a class="nav-item active" href="Prevodnik.html">                                                           <!-- Navigační odkaz na Prevodnik.html -->
                <div class="reveal-dot"></div>
                <svg class="nav-icon" viewBox="0 0 20 20"><path d="M3 6h11M10 3l4 3-4 3M17 14H6M10 11l-4 3 4 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span class="nav-label">Převodník</span>
            </a>
        </nav>                                                                                                          <!-- ---------------------------------------------- -->
    </header>

    <div class="content">                                                                                               <!-- Struktura převodníku -->
        <main class="page">
            <div class="converter window">
                <div class="title-bar">kalkulačka.exe</div>

                <div class="display converter-display">
                    <div class="mode-header">
                        <span class="mode-label">Převod měn</span>
                    </div>

                    <div class="converter-row">
                        <select name="fromCurrency" id="fromCurrency" class="currency-select">
                            <option value="CZK">CZK</option>
                            <option value="USD" selected>USD</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                        </select>
                        <input type="text" name="fromAmount" id="fromAmount" class="amount-input" inputmode="decimal" value="1">
                    </div>

                    <div class="converter-meta">
                        <span class="rate-line" id="rateLine"></span>
                        <button class="btn-function swap-button" id="swapButton" type="button" aria-label="Prohodit měny">⇅</button>
                    </div>

                    <div class="converter-row">
                        <select name="toCurrency" id="toCurrency" class="currency-select">
                            <option value="CZK" selected>CZK</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                        </select>
                        <input type="text" name="toAmount" id="toAmount" class="amount-output" readonly>
                    </div>
                </div>                                                                                                  <!-- ---------------------------------------------- -->

                <div class="buttons converter-buttons">                                                                 <!-- Číselná tlačítka -->
                    <button class="btn-function" id="btn-ce" data-key="Delete">CE</button>
                    <button class="btn-function" id="btn-c" data-key="Escape">C</button>
                    <button class="btn-function btn-backspace" id="btn-back" data-key="Backspace">⌫</button>

                    <button class="btn-standard" id="btn-7" data-key="7">7</button>
                    <button class="btn-standard" id="btn-8" data-key="8">8</button>
                    <button class="btn-standard" id="btn-9" data-key="9">9</button>

                    <button class="btn-standard" id="btn-4" data-key="4">4</button>
                    <button class="btn-standard" id="btn-5" data-key="5">5</button>
                    <button class="btn-standard" id="btn-6" data-key="6">6</button>

                    <button class="btn-standard" id="btn-1" data-key="1">1</button>
                    <button class="btn-standard" id="btn-2" data-key="2">2</button>
                    <button class="btn-standard" id="btn-3" data-key="3">3</button>

                    <button class="btn-standard" id="btn-0" data-key="0">0</button>
                    <button class="btn-standard" id="btn-dot" data-key=".">.</button>                                   <!-- ---------------------------------------------- -->
                </div>
            </div>
        </main>

        <footer>
            <p>
                &copy; Jakub Reimer 2026<br>                                                                                 <!-- Informace o "školní projektovosti" -->
                Jedná se o školní projekt.<br>
            </p>
        </footer>
    </div>

    <div class="activation-watermark">                                                                                  <!-- Activate windows watermark -->
        <h1>Activate Windows</h1>
        <p>Go to the Settings to activate Windows</p>
    </div>

    <script src="Prevodnik.js"></script>                                                                                <!-- Script pro převodník -->

    <script src="Navbar.js"></script>                                                                                   <!-- Navbar script -->
</body>
</html>
